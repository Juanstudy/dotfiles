# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                         GENTLEMAN DOTS - ALACRITTY                           ║
# ║                          Optimized for Neovim                                ║
# ╚══════════════════════════════════════════════════════════════════════════════╝


# ┌──────────────────────────────────────────────────────────────────────────────┐
# │                                   FONT                                       │
# └──────────────────────────────────────────────────────────────────────────────┘

[font]
size = 9

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │                                  WINDOW                                      │
# └──────────────────────────────────────────────────────────────────────────────┘

[window]
opacity = 0.955
blur = true
option_as_alt = "Both"


# ┌──────────────────────────────────────────────────────────────────────────────┐
# │                                  CURSOR                                      │
# └──────────────────────────────────────────────────────────────────────────────┘

[cursor]
style = "Block"
blink_interval = 500
unfocused_hollow = true
vi_mode_style = "Block"


# ┌──────────────────────────────────────────────────────────────────────────────┐
# │                                 TERMINAL                                     │
# └──────────────────────────────────────────────────────────────────────────────┘

[terminal]
# For best Neovim compatibility, install alacritty terminfo:
# sudo tic -xe alacritty,alacritty-direct extra/alacritty.info

[env]
TERM = "xterm-256color"

[terminal.shell]
program = "/home/linuxbrew/.linuxbrew/bin/fish"
args = ["-l"]

[hints]
enabled = []


