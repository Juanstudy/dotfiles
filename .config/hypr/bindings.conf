# Application bindings
bind = SUPER, RETURN,exec, ghostty
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, E, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment

# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# ── Vim-style hjkl navigation ───────────────────────────────
# Las flechas siguen andando (definidas en defaults de Omarchy)

unbind = SUPER, J
unbind = SUPER, L
bindd = SUPER, H, Focus on left window, movefocus, l
bindd = SUPER, J, Focus on below window, movefocus, d
bindd = SUPER, K, Focus on above window, movefocus, u
bindd = SUPER, L, Focus on right window, movefocus, r

# Libera colisiones con defaults de Omarchy
unbind = SUPER CTRL, H
unbind = SUPER CTRL, L
bindd = SUPER CTRL, H, Swap window to the left, swapwindow, l
bindd = SUPER CTRL, J, Swap window below, swapwindow, d
bindd = SUPER CTRL, K, Swap window above, swapwindow, u
bindd = SUPER CTRL, L, Swap window to the right, swapwindow, r

bindd = SUPER SHIFT, H, Shrink window left, resizeactive, -50 0
bindd = SUPER SHIFT, J, Grow window down, resizeactive, 0 50
bindd = SUPER SHIFT, K, Shrink window up, resizeactive, 0 -50
bindd = SUPER SHIFT, L, Grow window right, resizeactive, 50 0

# Mover ventana a workspace con CTRL en vez de SHIFT
unbind = SUPER SHIFT, code:10
unbind = SUPER SHIFT, code:11
unbind = SUPER SHIFT, code:12
unbind = SUPER SHIFT, code:13
unbind = SUPER SHIFT, code:14
unbind = SUPER SHIFT, code:15
unbind = SUPER SHIFT, code:16
unbind = SUPER SHIFT, code:17
unbind = SUPER SHIFT, code:18
unbind = SUPER SHIFT, code:19
bindd = SUPER CTRL, code:10, Move window to workspace 1, movetoworkspace, 1
bindd = SUPER CTRL, code:11, Move window to workspace 2, movetoworkspace, 2
bindd = SUPER CTRL, code:12, Move window to workspace 3, movetoworkspace, 3
bindd = SUPER CTRL, code:13, Move window to workspace 4, movetoworkspace, 4
bindd = SUPER CTRL, code:14, Move window to workspace 5, movetoworkspace, 5
bindd = SUPER CTRL, code:15, Move window to workspace 6, movetoworkspace, 6
bindd = SUPER CTRL, code:16, Move window to workspace 7, movetoworkspace, 7
bindd = SUPER CTRL, code:17, Move window to workspace 8, movetoworkspace, 8
bindd = SUPER CTRL, code:18, Move window to workspace 9, movetoworkspace, 9
bindd = SUPER CTRL, code:19, Move window to workspace 10, movetoworkspace, 10

